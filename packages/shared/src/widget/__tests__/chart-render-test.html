<!DOCTYPE html>

<title>Widget Chart Render Test</title>
<style>
body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 16px; background: #f8fafc; color: #1e293b; }
h1 { font-size: 18px; font-weight: 600; margin: 0 0 4px; }
.subtitle { font-size: 12px; color: #64748b; margin-bottom: 12px; }
#summary { font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 6px; background: #e2e8f0; color: #475569; margin-bottom: 16px; display: inline-block; }
#summary.all-pass { background: #dcfce7; color: #166534; }
#summary.has-fail { background: #fee2e2; color: #991b1b; }
.test-case { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 16px; overflow: hidden; }
.test-header { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.test-title { font-size: 12px; font-weight: 500; color: #334155; flex: 1; font-family: monospace; }
.status { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
.status.pending { background: #f1f5f9; color: #64748b; }
.status.pass    { background: #dcfce7; color: #166534; }
.status.fail    { background: #fee2e2; color: #991b1b; }

.iframe-wrap { padding: 8px; background: #fff; }
iframe { width: 100%; border: none; display: block; transition: height 0.25s ease-out; background: #fff; }
</style>
</head>
<body>
<h1>Widget Chart Render Test</h1>
<p class="subtitle">
  Tests the fixed <code>appendScript</code> in <code>buildReceiverSrcdoc</code>.
  Each iframe receives a <code>widget:finalize</code> postMessage with content from
  <code>failed-rendering/code*.html</code>. PASS = iframe reports height &gt; 50px.
</p>
<div id="summary">Running...</div>
<div id="tests"></div>

<script>
// ── CSP for sandboxed iframe ──────────────────────────────────────────────────────────────────
const CSP = [
  "default-src 'none'",
  "script-src 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://unpkg.com https://esm.sh",
  "style-src 'unsafe-inline'",
  "img-src * data: blob:",
  "font-src * data:",
  "connect-src 'none'",
].join('; ');

// ── Receiver script ───────────────────────────────────────────────────────────────────────────
// This is the fixed version of the receiver from buildReceiverSrcdoc (widget-sanitizer.ts).
// Key fix: appendScript(idx+1) is called BEFORE onloadCode so inline scripts run first,
// defining init functions before the onload callback tries to call them.
const RECEIVER_JS = `(function(){
var root=document.getElementById('__root');
var _t=null,_first=true,_retryCount=0;
function _h(){
  if(_t)clearTimeout(_t);
  _t=setTimeout(function(){
    var h=document.body.scrollHeight;
    if(h>0)parent.postMessage({type:'widget:resize',height:h,first:_first},'*');
    _first=false;
  },60);
}
new ResizeObserver(_h).observe(document.body);
function applyHtml(html){root.innerHTML=html;_h();}
function _verifyChart(){
  var canvases=root.querySelectorAll('canvas');
  if(canvases.length===0)return;
  for(var i=0;i<canvases.length;i++){
    var cv=canvases[i];
    if(cv.offsetWidth===0||cv.offsetHeight===0){
      var p=cv.parentElement;
      if(p&&(!p.style.height||p.style.height==='0px'))p.style.height='300px';
      _h();
    }
  }
}
function finalizeHtml(html){
  var tmp=document.createElement('div');
  tmp.innerHTML=html;
  var ss=tmp.querySelectorAll('script');
  var scripts=[];
  for(var i=0;i<ss.length;i++){
    var s=ss[i];
    var entry={src:s.getAttribute('src')||'',text:s.textContent||'',attrs:[]};
    for(var j=0;j<s.attributes.length;j++){
      var a=s.attributes[j];
      if(a.name!=='src')entry.attrs.push({name:a.name,value:a.value});
    }
    scripts.push(entry);s.remove();
  }
  var visualHtml=tmp.innerHTML;
  if(root.innerHTML!==visualHtml)root.innerHTML=visualHtml;
  function appendScript(idx){
    if(idx>=scripts.length){
      [200,600,1500].forEach(function(ms){
        setTimeout(function(){if(_retryCount<3){_retryCount++;_verifyChart();}},ms);
      });
      return;
    }
    var s=scripts[idx];
    var n=document.createElement('script');
    if(s.src){
      var onloadCode=null;
      for(var j=0;j<s.attrs.length;j++){
        var aname=s.attrs[j].name.toLowerCase();
        if(aname==='crossorigin')continue;
        if(aname==='onload'){onloadCode=s.attrs[j].value;continue;}
        n.setAttribute(s.attrs[j].name,s.attrs[j].value);
      }
      n.src=s.src;
      n.onload=(function(code){return function(){
        // Load remaining scripts FIRST: inline scripts execute synchronously,
        // so by the time appendScript returns, init functions are already defined.
        appendScript(idx+1);
        if(code){
          // Only call onload code if inline scripts have not already initialised charts.
          var cvs=root.querySelectorAll('canvas');
          var chartsExist=cvs.length>0&&window.Chart&&typeof Chart.getChart==='function'&&
            Array.prototype.some.call(cvs,function(cv){return !!Chart.getChart(cv);});
          if(chartsExist){
            console.log('[widget-iframe] Charts already initialised, skipping onload code');
          }else{
            try{new Function(code)();}catch(e){console.error('[widget-iframe] onload error:',e);}
          }
        }
        _h();
      };})(onloadCode);
      n.onerror=function(){appendScript(idx+1);};
      root.appendChild(n);
    }else{
      if(s.text)n.textContent=s.text;
      for(var j=0;j<s.attrs.length;j++){
        if(s.attrs[j].name.toLowerCase()==='crossorigin')continue;
        n.setAttribute(s.attrs[j].name,s.attrs[j].value);
      }
      root.appendChild(n);
      appendScript(idx+1);
    }
  }
  appendScript(0);_h();
}
window.addEventListener('message',function(e){
  if(!e.data)return;
  switch(e.data.type){
    case 'widget:update':applyHtml(e.data.html);break;
    case 'widget:finalize':finalizeHtml(e.data.html);setTimeout(_h,150);break;
    case 'widget:theme':
      var r=document.documentElement,v=e.data.vars;
      if(v)for(var k in v)r.style.setProperty(k,v[k]);
      if(typeof e.data.isDark==='boolean')r.className=e.data.isDark?'dark':'';
      setTimeout(_h,100);break;
  }
});
parent.postMessage({type:'widget:ready'},'*');
})();`;

function buildSrcdoc() {
  return '<!DOCTYPE html><html><head>'
    + '<meta charset="utf-8">'
    + '<meta name="viewport" content="width=device-width,initial-scale=1">'
    + '<meta http-equiv="Content-Security-Policy" content="' + CSP + '">'
    + '<style>*{box-sizing:border-box}body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;font-size:14px;color:#1e293b;background:#fff}</style>'
    + '</head><body style="margin:0;padding:0;">'
    + '<div id="__root"></div>'
    + '<script>' + RECEIVER_JS + '<\/script>'
    + '</body></html>';
}

  },
];

// ── Test runner ───────────────────────────────────────────────────────────────────────────────
const SRCDOC = buildSrcdoc();
const testsEl = document.getElementById('tests');
const summaryEl = document.getElementById('summary');
let passed = 0, timedOut = 0;
const total = CASES.length;

function updateSummary() {
  const done = passed + timedOut;
  if (done < total) {
    summaryEl.textContent = 'Running... (' + done + '/' + total + ')';
    summaryEl.className = '';
  } else if (timedOut === 0) {
    summaryEl.textContent = passed + ' / ' + total + ' PASS — all charts rendered';
    summaryEl.className = 'all-pass';
  } else {
    summaryEl.textContent = passed + ' / ' + total + ' PASS, ' + timedOut + ' failed';
    summaryEl.className = 'has-fail';
  }
}

CASES.forEach(function(tc) {
  // Build DOM
  const wrapper = document.createElement('div');
  wrapper.className = 'test-case';

  const header = document.createElement('div');
  header.className = 'test-header';
  header.innerHTML =
    '<span class="test-title">' + tc.id + '</span>' +
    '<span class="test-title" style="font-family:system-ui;font-weight:400;color:#64748b;">' + tc.title + '</span>' +
    '<span class="status pending" id="status-' + tc.id + '">Pending</span>';
  wrapper.appendChild(header);

  const iframeWrap = document.createElement('div');
  iframeWrap.className = 'iframe-wrap';
  const iframe = document.createElement('iframe');
  iframe.setAttribute('sandbox', 'allow-scripts');
  iframe.style.cssText = 'width:100%;height:20px;border:none;display:block;';
  iframe.srcdoc = SRCDOC;
  iframeWrap.appendChild(iframe);
  wrapper.appendChild(iframeWrap);
  testsEl.appendChild(wrapper);

  let ready = false;
  let resolved = false;

  function resolve(ok, msg) {
    if (resolved) return;
    resolved = true;
    const statusEl = document.getElementById('status-' + tc.id);
    if (ok) {
      statusEl.textContent = 'PASS — ' + msg;
      statusEl.className = 'status pass';
      passed++;
    } else {
      statusEl.textContent = 'FAIL — ' + msg;
      statusEl.className = 'status timeout';
      timedOut++;
    }
    updateSummary();
  }

  window.addEventListener('message', function(e) {
    if (e.source !== iframe.contentWindow) return;
    const type = e.data && e.data.type;

    if (type === 'widget:ready' && !ready) {
      ready = true;
      iframe.contentWindow.postMessage({ type: 'widget:finalize', html: tc.html }, '*');
    }

    if (type === 'widget:resize') {
      const h = e.data.height || 0;
      if (h > 50) {
        iframe.style.height = Math.min(h + 4, 2400) + 'px';
        resolve(true, 'height ' + h + 'px');
      }
    }
  });

  // Timeout after 15s (CDN load + render time)
  setTimeout(function() {
    resolve(false, 'chart not rendered within 15s — CDN timeout or script error');
  }, 15000);
});

updateSummary();
</script>
</body>
</html>
